## ===== HTTP =====
# HTTP -> HTTPS (non-www)
server {
    listen 80;
    listen [::]:80;
    server_name corazyarcade.site;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }

    # Force HTTPS
    location / {
        return 301 https://corazyarcade.site$request_uri;
    }
}

# HTTP www -> HTTPS non-www
server {
    listen 80;
    listen [::]:80;
    server_name www.corazyarcade.site;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }

    # Redirect www -> non-www
    location / {
        return 301 https://corazyarcade.site$request_uri;
    }
}

## ===== HTTPS =====
# HTTPS non-www
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name corazyarcade.site;

    ssl_certificate /etc/letsencrypt/live/corazyarcade.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/corazyarcade.site/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Hide server tokens
    server_tokens off;

    # Static site root
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript \
               application/x-javascript application/xml+rss \
               application/javascript application/json;

    # ===== HTTP API reverse proxy (REST + WebSocket) =====
    location /api {
        proxy_pass http://your-gateway-server-ip:8080;

        # === CORS 설정 ===
        add_header Access-Control-Allow-Origin "http://localhost:5173" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;

        # Preflight 요청(OPTIONS) 빠르게 처리
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "http://localhost:5173" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_buffering off;
    }

    # Socket.IO path-specific tuning
    location /api/chat {
        proxy_pass http://your-gateway-server-ip:8080;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout 1h;
        proxy_read_timeout 1h;

        proxy_buffering off;
        gzip off;
    }

    # Static asset caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Avoid caching HTML
    location ~* \.html$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # GoAccess 대시보드 
    location /stats {
        alias /var/www/goaccess;
        index report.html;
        
        # 보안을 위한 Basic Auth
        auth_basic "Stats Access";
        auth_basic_user_file /etc/nginx/.htpasswd;
    }
    
    # GoAccess WebSocket 프록시
    location /ws {
        proxy_pass http://your-goaccess-server-ip:7890;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page 404 /index.html;
}

# HTTPS www -> non-www
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.corazyarcade.site;

    ssl_certificate /etc/letsencrypt/live/corazyarcade.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/corazyarcade.site/privkey.pem;

    return 301 https://corazyarcade.site$request_uri;
}
