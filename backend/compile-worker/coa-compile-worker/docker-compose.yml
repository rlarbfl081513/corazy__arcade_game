version: "3.8"

services:
  # 코드 컴파일 서버
  compile-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coa-compile-server
    # Linux에서 Docker 소켓 권한 문제 해결
    # user: "${UID:-1000}:${GID:-1000}"  # 필요 시 주석 해제
    environment:
      # RabbitMQ 설정 (외부 서버)
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE:-WorkerQueue}

      # Redis 설정 (외부 서버)
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}

      # AWS S3 설정
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}

      # Docker 설정
      DOCKER_SOCKET_PATH: /var/run/docker.sock

      # 서비스 설정
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}

      # Worker 설정
      WORKER_PREFETCH: ${WORKER_PREFETCH:-5}

      # 실행 제한
      DEFAULT_TIMEOUT: ${DEFAULT_TIMEOUT:-5000}
      DEFAULT_MEMORY_LIMIT: ${DEFAULT_MEMORY_LIMIT:-256}
      DEFAULT_CPU_QUOTA: ${DEFAULT_CPU_QUOTA:-50000}

    volumes:
      # Docker 소켓 마운트 (호스트의 Docker 사용)
      - /var/run/docker.sock:/var/run/docker.sock
      # 호스트 /tmp를 마운트 (코드 실행 컨테이너와 파일 공유)
      - /tmp:/tmp

    restart: unless-stopped

    # 네트워크 모드: host (외부 RabbitMQ/Redis 접근용)
    # Windows/Mac에서는 host 모드 대신 호스트 IP 사용
    # network_mode: "host"  # Linux 전용, Windows/Mac에서는 주석 처리

    # 또는 bridge 네트워크 사용 (기본)
    # ports:
    #   - "3000:3000"  # 필요시 포트 노출
