<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket 테스트 - COA Compile Server</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 30px;
        }
        
        .section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
        }
        
        .section h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            resize: vertical;
            font-family: 'Courier New', monospace;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .logs {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            border-radius: 8px;
            height: 500px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
        }
        
        .log-entry {
            margin-bottom: 10px;
            padding: 8px;
            border-left: 3px solid #667eea;
            background: rgba(102, 126, 234, 0.1);
        }
        
        .log-timestamp {
            color: #888;
            font-size: 11px;
        }
        
        .log-success {
            border-left-color: #4caf50;
            background: rgba(76, 175, 80, 0.1);
        }
        
        .log-error {
            border-left-color: #f44336;
            background: rgba(244, 67, 54, 0.1);
        }
        
        .log-info {
            border-left-color: #2196f3;
            background: rgba(33, 150, 243, 0.1);
        }
        
        .status {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 600;
        }
        
        .status.connected {
            background: #4caf50;
            color: white;
        }
        
        .status.disconnected {
            background: #f44336;
            color: white;
        }
        
        .status.connecting {
            background: #ff9800;
            color: white;
        }
        
        .progress {
            background: #e0e0e0;
            border-radius: 10px;
            height: 20px;
            overflow: hidden;
            margin: 10px 0;
        }
        
        .progress-bar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: 600;
        }
        
        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 COA Compile Server WebSocket Test</h1>
            <p>실시간 코드 실행 및 채점 테스트</p>
        </div>
        
        <div class="content">
            <div>
                <div class="section">
                    <h2>🔌 1. WebSocket 연결 (먼저!)</h2>
                    <div class="form-group">
                        <label>Submission UUID</label>
                        <input type="text" id="submissionUuid" placeholder="비워두면 자동 생성됩니다">
                    </div>
                    <button onclick="generateUuid()" style="background:#9c27b0; margin-bottom:10px;">🎲 UUID 자동 생성</button>
                    <button onclick="connectWebSocket()" id="connectBtn">WebSocket 연결</button>
                    <button onclick="disconnectWebSocket()" id="disconnectBtn" style="display:none; margin-top:10px; background:#f44336;">연결 끊기</button>
                    
                    <div id="statusDiv" class="status disconnected" style="margin-top: 15px;">
                        연결 안됨
                    </div>
                    
                    <div id="progressDiv" style="display:none;">
                        <div class="progress">
                            <div class="progress-bar" id="progressBar" style="width: 0%">0%</div>
                        </div>
                    </div>
                </div>
                
                <div class="section" style="margin-top: 20px;">
                    <h2>📝 2. 작업 제출</h2>
                    <div class="form-group">
                        <label>문제 번호</label>
                        <input type="number" id="problemId" value="1000" min="1">
                    </div>
                    <div class="form-group">
                        <label>언어</label>
                        <select id="language">
                            <option value="python">Python</option>
                            <option value="javascript">JavaScript</option>
                            <option value="java">Java</option>
                            <option value="c">C</option>
                            <option value="cpp">C++</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>모드</label>
                        <select id="mode">
                            <option value="SAMPLE">SAMPLE (테스트)</option>
                            <option value="EVALUATE">EVALUATE (제출)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>코드</label>
                        <textarea id="code" rows="8">print("Hello World")</textarea>
                    </div>
                    <div class="form-group">
                        <label>입력 (SAMPLE 모드)</label>
                        <input type="text" id="input" placeholder="예: 1 2 3">
                    </div>
                    <button onclick="submitJob()" id="submitBtn" disabled>작업 제출 (먼저 WebSocket 연결!)</button>
                </div>
            </div>
            
            <div>
                <div class="section" style="height: calc(100% - 40px);">
                    <h2>📊 실시간 로그</h2>
                    <div class="logs" id="logs">
                        <div class="log-entry log-info">
                            <div class="log-timestamp">[대기 중]</div>
                            <div>작업을 제출하고 WebSocket에 연결하세요.</div>
                        </div>
                    </div>
                    <button onclick="clearLogs()" style="margin-top: 10px; background: #757575;">로그 지우기</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SERVER_URL = 'http://localhost:8000';
        const WS_URL = 'ws://localhost:8000';
        let ws = null;
        
        function log(message, type = 'info') {
            const logs = document.getElementById('logs');
            const timestamp = new Date().toLocaleTimeString('ko-KR', { hour12: false, fractional: 3 });
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.innerHTML = `
                <div class="log-timestamp">[${timestamp}]</div>
                <div>${message}</div>
            `;
            logs.appendChild(entry);
            logs.scrollTop = logs.scrollHeight;
        }
        
        function clearLogs() {
            document.getElementById('logs').innerHTML = '';
            log('로그가 초기화되었습니다.', 'info');
        }
        
        function updateStatus(status, text) {
            const statusDiv = document.getElementById('statusDiv');
            statusDiv.className = `status ${status}`;
            statusDiv.textContent = text;
        }
        
        function updateProgress(current, total) {
            const progressDiv = document.getElementById('progressDiv');
            const progressBar = document.getElementById('progressBar');
            
            if (total > 0) {
                progressDiv.style.display = 'block';
                const percentage = Math.round((current / total) * 100);
                progressBar.style.width = percentage + '%';
                progressBar.textContent = `${current}/${total} (${percentage}%)`;
            } else {
                progressDiv.style.display = 'none';
            }
        }
        
        function generateUuid() {
            // 간단한 UUID v4 생성
            const uuid = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
            document.getElementById('submissionUuid').value = uuid;
            log(`📝 UUID 생성됨: ${uuid}`, 'info');
        }
        
        async function submitJob() {
            const uuid = document.getElementById('submissionUuid').value;
            
            if (!uuid) {
                log('❌ Submission UUID가 필요합니다. 먼저 WebSocket을 연결하세요!', 'error');
                return;
            }
            
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                log('❌ WebSocket이 연결되지 않았습니다. 먼저 연결하세요!', 'error');
                return;
            }
            
            const data = {
                submission_uuid: uuid,  // UUID 포함하여 전송
                problem_id: parseInt(document.getElementById('problemId').value),
                code: document.getElementById('code').value,
                language: document.getElementById('language').value,
                mode: document.getElementById('mode').value,
                input: document.getElementById('input').value
            };
            
            log('작업 제출 중...', 'info');
            
            try {
                const response = await fetch(`${SERVER_URL}/api/algorithm/enqueue`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || '작업 제출 실패');
                }
                
                const result = await response.json();
                log(`✅ 작업이 제출되었습니다!`, 'success');
                log(`UUID: ${result.submission_uuid}`, 'info');
                log('📨 실시간 결과를 기다리는 중...', 'info');
                
            } catch (error) {
                log(`❌ 작업 제출 실패: ${error.message}`, 'error');
            }
        }
        
        function connectWebSocket() {
            let uuid = document.getElementById('submissionUuid').value.trim();
            
            // UUID가 비어있으면 자동 생성
            if (!uuid) {
                generateUuid();
                uuid = document.getElementById('submissionUuid').value;
            }
            
            log(`WebSocket 연결 시도: ${uuid}`, 'info');
            updateStatus('connecting', '연결 중...');
            
            ws = new WebSocket(`${WS_URL}/api/algorithm/ws/${uuid}`);
            
            ws.onopen = () => {
                log('✅ WebSocket 연결 성공!', 'success');
                log('💡 이제 작업을 제출할 수 있습니다!', 'info');
                updateStatus('connected', '연결됨');
                document.getElementById('connectBtn').style.display = 'none';
                document.getElementById('disconnectBtn').style.display = 'block';
                document.getElementById('submitBtn').disabled = false;
                document.getElementById('submitBtn').textContent = '작업 제출';
                document.getElementById('submissionUuid').readOnly = true;
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleMessage(data);
            };
            
            ws.onerror = (error) => {
                log('❌ WebSocket 에러 발생', 'error');
                updateStatus('disconnected', '에러 발생');
            };
            
            ws.onclose = () => {
                log('🔌 WebSocket 연결 종료', 'info');
                updateStatus('disconnected', '연결 끊김');
                document.getElementById('connectBtn').style.display = 'block';
                document.getElementById('disconnectBtn').style.display = 'none';
                document.getElementById('submitBtn').disabled = true;
                document.getElementById('submitBtn').textContent = '작업 제출 (먼저 WebSocket 연결!)';
                document.getElementById('submissionUuid').readOnly = false;
            };
        }
        
        function disconnectWebSocket() {
            if (ws) {
                ws.close();
                ws = null;
            }
        }
        
        function handleMessage(data) {
            const type = data.type;
            
            switch(type) {
                case 'progress':
                    log(`⏳ 진행: ${data.current}/${data.total} - ${data.message}`, 'info');
                    updateProgress(data.current, data.total);
                    break;
                    
                case 'testcase':
                    const tc = data.result;
                    const emoji = tc.status === 'AC' ? '✅' : '❌';
                    log(`${emoji} 테스트케이스 #${tc.test_case_number}: ${tc.status} (${tc.execution_time}ms, ${tc.memory_usage}MB)`, 
                        tc.status === 'AC' ? 'success' : 'error');
                    break;
                    
                case 'result':
                    const result = data.result;
                    log(`📊 최종 결과: ${result.status}`, result.status === 'AC' ? 'success' : 'error');
                    if (result.score !== undefined) {
                        log(`   점수: ${result.score}점 (${result.passed_test_cases}/${result.total_test_cases} 통과)`, 'info');
                    }
                    if (result.output !== undefined) {
                        log(`   출력: ${result.output}`, 'info');
                    }
                    log(`   메시지: ${result.message}`, 'info');
                    break;
                    
                case 'error':
                    log(`❌ 에러: ${data.error_type} - ${data.error}`, 'error');
                    break;
                    
                case 'complete':
                    log(`✨ 완료: ${data.message}`, 'success');
                    updateProgress(0, 0);
                    setTimeout(() => {
                        disconnectWebSocket();
                    }, 2000);
                    break;
                    
                default:
                    log(`알 수 없는 메시지: ${JSON.stringify(data)}`, 'info');
            }
        }
    </script>
</body>
</html>
